      direction.subVectors(b, a);
      const length = direction.length();
      midpoint.addVectors(a, b).multiplyScalar(0.5);
      // Orient unit cylinder (+Y) to point from a to b.
      quat.setFromUnitVectors(yAxis, direction.clone().normalize());

      const mesh = new THREE.Mesh(cylinderGeo, bondMaterial);
      mesh.position.copy(midpoint);
      mesh.quaternion.copy(quat);
      mesh.scale.set(1, length, 1);
      molecule.add(mesh);
    }

    // Slight composition offset — molecule slightly off-centre to the right
    // (per brief), to leave more negative space on the left for text overlay.
    molecule.position.x = 1.6;

    // --- Resize handling ---
    function resize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Animation: constant slow rotation about Y, ~36 seconds per revolution ---
    const ROTATION_PERIOD_SECONDS = 36;
    const ANGULAR_VELOCITY = (2 * Math.PI) / ROTATION_PERIOD_SECONDS;
    let lastTime = performance.now();

    function tick(now) {
      const dt = (now - lastTime) / 1000;
      lastTime = now;
      molecule.rotation.y += ANGULAR_VELOCITY * dt;
      renderer.render(scene, camera);
    }
    renderer.setAnimationLoop(tick);
  </script>
</body>
</html>
